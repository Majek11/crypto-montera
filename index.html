  <!-- ── Google Translate ─────────────────────────────────────────────── -->
  <script type="text/javascript">
    // Global variables for Google Translate
    window.googleTranslateConfig = {
      pageLanguage: 'en',
      includedLanguages: 'af,sq,am,ar,hy,az,eu,be,bn,bs,bg,ca,ceb,ny,zh,co,hr,cs,da,nl,en,eo,et,tl,fi,fr,fy,gl,ka,de,el,gu,ht,ha,haw,iw,hi,hmn,hu,is,ig,id,ga,it,ja,jw,kn,kk,km,ko,ku,ky,lo,la,lv,lt,lb,mk,mg,ms,ml,mt,mi,mr,mn,my,ne,no,ps,fa,pl,pt,pa,ro,ru,sm,gd,sr,st,sn,sd,si,sk,sl,so,es,su,sw,sv,tg,ta,te,th,tr,uk,ur,uz,vi,cy,xh,yi,yo,zu',
      layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
      autoDisplay: false,
      multilanguagePage: true
    };

    function googleTranslateElementInit() {
      if (typeof google !== 'undefined' && google.translate) {
        new google.translate.TranslateElement(
          window.googleTranslateConfig,
          'google_translate_element'
        );
        
        // Make translate functions globally available
        window.translatePage = function(langCode) {
          var selectElement = document.querySelector('.goog-te-combo');
          if (selectElement) {
            selectElement.value = langCode;
            selectElement.dispatchEvent(new Event('change', { bubbles: true }));
            return true;
          }
          return false;
        };
        
        window.resetTranslation = function() {
          var selectElement = document.querySelector('.goog-te-combo');
          if (selectElement) {
            selectElement.value = '';
            selectElement.dispatchEvent(new Event('change', { bubbles: true }));
            return true;
          }
          return false;
        };
        
        // Notify that Google Translate is ready
        window.dispatchEvent(new CustomEvent('googleTranslateReady'));
      }
    }

    // Retry mechanism for Google Translate initialization
    function initGoogleTranslateWithRetry(attempts = 0) {
      if (attempts > 10) {
        console.warn('Google Translate failed to initialize after 10 attempts');
        return;
      }
      
      if (typeof google !== 'undefined' && google.translate && google.translate.TranslateElement) {
        googleTranslateElementInit();
      } else {
        setTimeout(() => initGoogleTranslateWithRetry(attempts + 1), 500);
      }
    }

    // Start initialization when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => initGoogleTranslateWithRetry());
    } else {
      initGoogleTranslateWithRetry();
    }
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  
  <!-- Custom Google Translate Styling -->
  <style>
    /* Hide Google Translate banner and toolbar */

    }

      top: 0px !important; 
    }
    .goog-te-ftab {
      display: none !important;
    }
    
    /* Hide the default Google Translate widget completely */
    #google_translate_element {
      display: none !important;
    }
    .goog-te-gadget {
      display: none !important;
    }
    
    /* Hide any visible Google Translate elements */
    .goog-te-combo {
      display: none !important;
    }
    
    /* Ensure the page doesn't get shifted */
    body.goog-te-hl {
      top: 0 !important;
    }
    
    /* Hide Google Translate attribution */
    .goog-te-gadget > span > a { 
      display: none !important; 
    }
    .goog-te-gadget > span { 
      display: none !important; 
    }
    
    /* Style translated content to maintain design */
    .goog-te-highlight {
      background: transparent !important;
      box-shadow: none !important;
    }
    
    /* Prevent layout shifts during translation */
    .goog-te-spinner-pos {
      display: none !important;
    }
  </style>
