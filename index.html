<!doctype html>
<html lang="en">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── Primary SEO ─────────────────────────────────────────────────── -->
  <title>Montera — Crypto Investment Platform</title>
  <meta name="description"
    content="Montera is a professional crypto investment platform with zero fees, bank-grade security, and real-time portfolio analytics. Start investing in Bitcoin, Ethereum, Solana, and more today." />

    content="crypto investment, bitcoin investment, ethereum investment, crypto platform, crypto portfolio, digital assets, DeFi, zero fees crypto, crypto trading" />
  <meta name="author" content="Montera" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://monteracrypto.com/" />

  <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp) ────────────────────── -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Montera" />
  <meta property="og:title" content="Montera — Crypto Investment Platform" />
  <meta property="og:description"
    content="Zero fees. Instant settlement. Bank-grade security. A professional crypto investment platform built for investors who demand more." />
  <meta property="og:url" content="https://monteracrypto.com/" />
  <meta property="og:image" content="https://monteracrypto.com/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="en_US" />

  <!-- ── Twitter / X Card ────────────────────────────────────────────── -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Montera — Crypto Investment Platform" />
  <meta name="twitter:description"
    content="Zero fees. Instant settlement. Bank-grade security. Start investing in crypto today." />
  <meta name="twitter:image" content="https://monteracrypto.com/og-image.png" />

  <!-- ── Theme & PWA ─────────────────────────────────────────────────── -->
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="color-scheme" content="dark" />

  <!-- ── Structured Data (JSON-LD) ───────────────────────────────────── -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FinancialService",
      "name": "Montera",
      "description": "A professional crypto investment platform with zero fees, bank-grade security, and real-time portfolio analytics.",
      "url": "https://monteracrypto.com/",
      "logo": "https://monteracrypto.com/logo.png",
      "serviceType": "Cryptocurrency Investment Platform",
      "areaServed": "Worldwide",
      "offers": {
        "@type": "Offer",
        "description": "Crypto investment plans with zero trading fees",
        "availability": "https://schema.org/InStock"
      }
    }
    </script>

  <!-- ── Favicon ──────────────────────────────────────────────────────── -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  
  <!-- ── Google Translate ─────────────────────────────────────────────── -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,es,fr,de,pt,ar,zh,ja,ko,ru,hi,it,tr,nl,pl,sv,da,no,fi,cs,sk,hu,ro,bg,hr,sl,et,lv,lt,mt,ga,cy,eu,ca,gl,ast,oc,co,br,gd,kw,gv,jv,su,tl,ceb,haw,mg,sm,ny,sn,st,xh,zu,af,sq,am,hy,az,be,bn,bs,my,km,ka,gu,ht,ha,hm,is,ig,id,yi,kn,kk,ky,lo,la,lv,mk,ml,mn,mr,ne,or,ps,fa,pa,qu,ro,sm,sr,si,so,sw,ta,te,th,ti,uk,ur,uz,vi,cy,fy,yo,zu',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false,
        multilanguagePage: true
      }, 'google_translate_element');
    }
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  
  <!-- Custom Google Translate Styling -->
  <style>
    /* Hide Google Translate banner */
    .goog-te-banner-frame.skiptranslate { display: none !important; }
    body { top: 0px !important; }
    
    /* Style the translate widget */
    .goog-te-gadget { 
      font-family: inherit !important;
      font-size: 0 !important;
    }
    .goog-te-gadget .goog-te-combo {
      background: hsl(var(--card)) !important;
      border: 1px solid hsl(var(--border)) !important;
      border-radius: 6px !important;
      color: hsl(var(--foreground)) !important;
      font-size: 12px !important;
      padding: 4px 8px !important;
      margin: 0 !important;
    }
    .goog-te-gadget .goog-te-combo:hover {
      border-color: hsl(var(--primary)) !important;
    }
    
    /* Hide "Powered by Google" text */
    .goog-te-gadget > span > a { display: none !important; }
    .goog-te-gadget > span { font-size: 0 !important; }
    
    /* Custom translate button styling */
    .translate-widget {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: 8px;
      font-size: 12px;
      color: hsl(var(--muted-foreground));
      transition: all 0.2s;
    }
    .translate-widget:hover {
      border-color: hsl(var(--primary));
      color: hsl(var(--foreground));
    }
  </style>
</head>
